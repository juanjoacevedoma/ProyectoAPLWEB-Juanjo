<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Componente | Hardware Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">HARDWARE<span>HUB</span></a>
            <div class="nav-links">
                <a href="index.html">Inventario</a>
                <a href="nuevo.html" class="active">Añadir</a>
                <a href="portafolio.html">Portafolio</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="header-meta">
            <h1>Añadir Nuevo Registro</h1>
            <p class="subtitle">Complete los campos técnicos para la base de datos.</p>
        </div>

        <div class="glass-card" style="max-width: 650px; margin: 0 auto; padding: 3rem;">
            <form action="#" method="POST">
                <div style="margin-bottom: 2rem;">
                    <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Nombre Completo del
                        Componente</label>
                    <input type="text" placeholder="Ej: Procesador Ryzen 9 7950X"
                        style="width: 100%; padding: 1rem; border: 1px solid var(--border); border-radius: 8px;"
                        required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                    <div>
                        <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Precio Unitario
                            (€)</label>
                        <input type="number" step="0.01" placeholder="0.00"
                            style="width: 100%; padding: 1rem; border: 1px solid var(--border); border-radius: 8px;"
                            required>
                    </div>
                    <div>
                        <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Stock Disponible</label>
                        <input type="number" value="1"
                            style="width: 100%; padding: 1rem; border: 1px solid var(--border); border-radius: 8px;"
                            required>
                    </div>
                </div>

                <div style="margin-bottom: 3rem;">
                    <label style="font-weight: 700; display: block; margin-bottom: 0.5rem;">Marca / Fabricante</label>
                    <select style="width: 100%; padding: 1rem; border: 1px solid var(--border); border-radius: 8px;"
                        required>
                        <option value="">Seleccione alianza...</option>
                        <option>Asus</option>
                        <option>Nvidia</option>
                        <option>Corsair</option>
                        <option>MSI</option>
                    </select>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 2; justify-content: center;">Guardar en
                        Inventario</button>
                    <a href="index.html" class="btn btn-secondary"
                        style="flex: 1; justify-content: center;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
